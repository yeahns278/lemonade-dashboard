name: Build Extension

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build and Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node_version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Compile
        run: npm run package

      - name: Create VSIX
        run: npx @vscode/vsce package

      - name: Get Short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Upload VSIX Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lemonade-dashboard-vsix-${{ steps.vars.outputs.sha_short }}
          path: "*.vsix"